apiVersion: apps/v1
kind: Deployment
metadata:
  name: fakruddeen-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fakruddeen-backend
  template:
    metadata:
      labels:
        app: fakruddeen-backend
    spec:
      containers:
      - name: backend
        image: fakruddeen-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: postgresql://user:password@db/fakruddeen_db
        - name: REDIS_URL
          value: redis://redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: fakruddeen-backend-service
spec:
  selector:
    app: fakruddeen-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
