<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fata AI Ultra - Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0f19; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
        .glow-button { position: relative; transition: all 0.3s ease; }
        .glow-button:hover { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); transform: translateY(-1px); }
        .ai-gradient-text { background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 h-screen flex overflow-hidden">

    <!-- Sidebar Element -->
    <aside class="w-72 bg-[#070a13] flex flex-col justify-between hidden lg:flex border-r border-slate-900/80 z-20">
        <div class="p-4 flex flex-col flex-1 overflow-hidden">
            <div class="flex items-center gap-3 px-2 mb-6">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-blue-600 via-indigo-600 to-purple-600 flex items-center justify-center text-white font-black shadow-lg">F</div>
                <div class="flex flex-col">
                    <span class="text-sm font-black tracking-wider text-white">FATA AI SUITE</span>
                    <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Workspace Core</span>
                </div>
            </div>

            <button onclick="createNewSession()" class="glow-button w-full border border-slate-800/80 bg-[#0d1324] hover:bg-[#131b32] text-slate-200 hover:text-white rounded-xl p-3 text-sm flex items-center justify-center gap-3 font-semibold transition group">
                <i class="fa-solid fa-square-plus text-blue-500 group-hover:text-blue-400 transition text-base"></i>Start New Session
            </button>
            
            <div class="mt-8 flex-1 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center px-2 mb-3">
                    <p class="text-[10px] text-slate-500 font-extrabold uppercase tracking-widest">Recent Contexts</p>
                    <i class="fa-solid fa-clock-rotate-left text-xs text-slate-600"></i>
                </div>
                <div id="session-list" class="flex-1 space-y-1.5 custom-scrollbar overflow-y-auto pr-1"></div>
            </div>
        </div>
        
        <div class="p-4 border-t border-slate-900 bg-[#05070d]">
            <div class="flex items-center justify-between bg-[#0d1324] border border-slate-800/50 p-3 rounded-xl">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-300 font-bold">
                        <i class="fa-solid fa-user-shield text-sm text-blue-400"></i>
                    </div>
                    <div class="flex flex-col overflow-hidden">
                        <span id="user-display-email" class="text-xs font-semibold text-slate-200 truncate">Connecting...</span>
                        <span id="infra-status-badge" class="text-[9px] text-yellow-400 font-bold flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></span> Booting Engine
                        </span>
                    </div>
                </div>
                <i class="fa-solid fa-gear text-slate-500 hover:text-slate-300 cursor-pointer text-sm transition"></i>
            </div>
        </div>
    </aside>

    <!-- Main Chat Interface -->
    <div class="flex-1 flex flex-col justify-between bg-[#0f1424] relative overflow-hidden">
        <nav class="w-full h-16 bg-[#090d1a]/90 backdrop-blur-md border-b border-slate-900/80 px-6 flex justify-between items-center z-10">
            <div class="flex items-center gap-4">
                <span class="text-lg font-black tracking-tight ai-gradient-text">FATA AI ULTRA</span>
                <span class="text-[10px] bg-indigo-950 text-indigo-400 px-2.5 py-0.5 rounded-md font-bold border border-indigo-900/60 uppercase">Cluster v2</span>
            </div>
            
            <div class="flex bg-[#05070d] p-1 rounded-xl border border-slate-800/60 shadow-inner">
                <button onclick="setChatMode('standard')" id="btn-standard" class="px-4 py-1.5 rounded-lg text-xs font-bold bg-blue-600 text-white shadow-md">Standard</button>
                <button onclick="setChatMode('notebook')" id="btn-notebook" class="px-4 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-200 ml-1">Notebook</button>
                <button onclick="setChatMode('voice')" id="btn-voice" class="px-4 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-200 ml-1">Voice</button>
            </div>

            <div class="hidden sm:flex items-center gap-3">
                <div class="text-xs bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5 text-slate-400">
                    <span class="text-blue-400 font-bold">Model:</span> <span id="model-tag-display">Gemini 1.5 Flash Engine</span>
                </div>
            </div>
        </nav>

        <main id="chat-window" class="flex-1 p-4 md:p-8 overflow-y-auto custom-scrollbar space-y-6 max-w-4xl w-full mx-auto pb-40">
            <div class="flex gap-4 max-w-3xl">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-sm font-black text-white flex-shrink-0">FA</div>
                <div class="bg-[#131a30] border border-slate-800/80 p-5 rounded-2xl rounded-tl-none text-sm text-slate-200 shadow-xl">
                    <h3 class="font-bold text-base text-white mb-1">System Connected Successfully</h3>
                    <p class="text-sm text-slate-300">Welcome to Fata AI Ultra Engine. Type a prompt below to communicate with the Gemini core processor.</p>
                </div>
            </div>
        </main>

        <!-- Input Area Container -->
        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#0f1424] via-[#0f1424]/95 to-transparent pt-12 pb-6 px-4 z-10">
            <div class="max-w-3xl mx-auto bg-[#070a13] border border-slate-800/90 rounded-2xl p-2.5 flex flex-col gap-2 focus-within:border-blue-600/60 transition">
                
                <div id="file-badge-area" class="flex flex-wrap gap-2 px-2 hidden">
                    <div class="bg-blue-950/80 border border-blue-800/60 px-3 py-1 rounded-lg flex items-center gap-2 text-xs text-blue-300">
                        <i class="fa-solid fa-file-invoice"></i><span id="file-name-span" class="max-w-[200px] truncate">File</span>
                        <button onclick="clearAttachment()" class="text-slate-400 hover:text-white ml-1 font-bold">&times;</button>
                    </div>
                </div>

                <textarea id="user-input" rows="1" placeholder="Type a message to Fata AI..." class="w-full bg-transparent resize-none outline-none text-slate-100 placeholder-slate-600 text-sm py-2 px-3 max-h-36 custom-scrollbar" onkeydown="handleKeyPress(event)"></textarea>
                
                <div class="flex justify-between items-center border-t border-slate-900 pt-2 px-1">
                    <div class="flex items-center gap-1.5">
                        <label class="w-8 h-8 rounded-lg hover:bg-slate-900 flex items-center justify-center text-slate-500 hover:text-slate-300 cursor-pointer transition">
                            <i class="fa-solid fa-paperclip text-sm"></i>
                            <input type="file" id="file-input" class="hidden" onchange="processFilePayload(event)">
                        </label>
                        <div class="w-[1px] h-4 bg-slate-800 mx-1"></div>
                        <span id="status-ticker" class="text-[10px] text-slate-600 font-semibold uppercase">Engine Idle</span>
                    </div>
                    
                    <button onclick="executePipeline()" class="bg-blue-600 hover:bg-blue-500 text-white rounded-xl px-5 py-2 text-xs font-bold flex items-center gap-2 transition glow-button">
                        <span>Send</span><i class="fa-solid fa-paper-plane text-[10px]"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIC SYSTEM SCRIPT -->
    <script>
        const BACKEND_URL = "https://fata-ai-backend.onrender.com";
        let currentSessionId = "session_" + Date.now();
        let currentChatMode = "standard";
        let authToken = null;

        let selectedFileBase64 = null;
        let selectedFileMime = null;

        function setTickerStatus(statusText, isError = false) {
            const ticker = document.getElementById("status-ticker");
            ticker.innerText = statusText;
            ticker.className = isError ? "text-[10px] text-red-400 font-bold uppercase" : "text-[10px] text-slate-600 font-semibold uppercase";
        }

        // Automatic Guest Core Authentication
        async function runAuthenticationFlow() {
            try {
                setTickerStatus("Authenticating...");
                const response = await fetch(`${BACKEND_URL}/api/v2/auth/guest`, { method: "POST" });
                if (!response.ok) throw new Error("Auth cluster denied access.");
                
                const payload = await response.json();
                authToken = payload.access_token;
                
                document.getElementById("user-display-email").innerText = payload.email.split("@")[0];
                document.getElementById("infra-status-badge").innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Infrastructure Live`;
                document.getElementById("infra-status-badge").className = "text-[9px] text-green-400 font-bold flex items-center gap-1";
                setTickerStatus("Idle");
            } catch (err) {
                setTickerStatus("Auth Offline", true);
                document.getElementById("infra-status-badge").innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Server Error`;
                document.getElementById("infra-status-badge").className = "text-[9px] text-red-400 font-bold flex items-center gap-1";
            }
        }

        window.addEventListener('online', () => { if(!authToken) runAuthenticationFlow(); });
        window.addEventListener('offline', () => { setTickerStatus("No Internet", true); });

        function setChatMode(mode) {
            currentChatMode = mode;
            document.getElementById("model-tag-display").innerText = mode === "notebook" ? "Gemini 1.5 Pro Engine" : "Gemini 1.5 Flash Engine";
            ["standard", "notebook", "voice"].forEach(m => {
                document.getElementById(`btn-${m}`).className = m === mode ? 
                    "px-4 py-1.5 rounded-lg text-xs font-bold bg-blue-600 text-white shadow-md" : 
                    "px-4 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-200 ml-1";
            });
        }

        function processFilePayload(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFileMime = file.type;
            document.getElementById("file-name-span").innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedFileBase64 = e.target.result.split(',')[1];
                document.getElementById("file-badge-area").classList.remove("hidden");
            };
            reader.readAsDataURL(file);
        }

        function clearAttachment() {
            selectedFileBase64 = null; selectedFileMime = null;
            document.getElementById("file-input").value = "";
            document.getElementById("file-badge-area").classList.add("hidden");
        }

        function createNewSession() {
            currentSessionId = "session_" + Date.now();
            document.getElementById("chat-window").innerHTML = `
                <div class="flex gap-4 max-w-3xl">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-sm font-black text-white">FA</div>
                    <div class="bg-[#131a30] border border-slate-800/80 p-5 rounded-2xl text-sm text-slate-200">New environment context layer ready.</div>
                </div>`;
            syncSessionHistoryLog();
        }

        function syncSessionHistoryLog() {
            const listRef = document.getElementById("session-list");
            const node = document.createElement("div");
            node.className = "p-2.5 bg-[#0d1324] hover:bg-[#131b32] rounded-xl text-xs text-slate-400 hover:text-white cursor-pointer truncate border border-slate-800/40 flex items-center gap-2.5 transition";
            node.innerHTML = `<i class="fa-solid fa-message text-slate-600"></i> Context: ${currentSessionId.substring(8)}`;
            listRef.prepend(node);
        }

        function handleKeyPress(event) { if (event.key === "Enter" && !event.shiftKey) { event.preventDefault(); executePipeline(); } }

        async function executePipeline() {
            if (!navigator.onLine) { setTickerStatus("No Internet", true); return; }
            if (!authToken) { await runAuthenticationFlow(); if(!authToken) return; }

            const inputField = document.getElementById("user-input");
            const promptText = inputField.value.trim();
            if (!promptText && !selectedFileBase64) return;
            
            inputField.value = "";
            const windowRef = document.getElementById("chat-window");

            if (promptText) {
                windowRef.innerHTML += `
                    <div class="flex gap-4 max-w-3xl ml-auto flex-row-reverse">
                        <div class="w-9 h-9 rounded-xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center text-sm font-black text-blue-400">User</div>
                        <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none text-sm font-medium">${promptText}</div>
                    </div>`;
            }
            windowRef.scrollTop = windowRef.scrollHeight;

            const aiNodeId = "ai_" + Date.now();
            windowRef.innerHTML += `
                <div class="flex gap-4 max-w-3xl">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-sm font-black text-white flex-shrink-0">FA</div>
                    <div id="${aiNodeId}" class="bg-[#131a30] border border-slate-800/80 p-5 rounded-2xl rounded-tl-none text-sm text-slate-300 shadow-xl">
                        <i class="fa-solid fa-circle-notch animate-spin text-blue-500 mr-2"></i> Processing Request...
                    </div>
                </div>`;
            windowRef.scrollTop = windowRef.scrollHeight;

            const responseBox = document.getElementById(aiNodeId);

            try {
                setTickerStatus("Streaming...");
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 45000);

                // GYARARREN URL HANYA: An daidaita ta zuwa /api/v2/chat/stream
                const response = await fetch(`${BACKEND_URL}/api/v2/chat/stream`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ 
                        message: promptText,
                        session_id: currentSessionId,
                        chat_mode: currentChatMode,
                        file_base64: selectedFileBase64 || "",
                        mime_type: selectedFileMime || ""
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeout);
                if (!response.ok) throw new Error(`HTTP Status ${response.status}`);
                
                clearAttachment();
                responseBox.innerHTML = "";

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";
                let streamBuffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    streamBuffer += decoder.decode(value, { stream: true });
                    const lines = streamBuffer.split("\n");
                    streamBuffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.trim()) {
                            try {
                                const parsed = JSON.parse(line.trim());
                                if (parsed.chunk) {
                                    fullText += parsed.chunk;
                                    responseBox.innerHTML = fullText.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
                                    windowRef.scrollTop = windowRef.scrollHeight;
                                }
                            } catch (e) {
                                if (!line.trim().startsWith("{")) {
                                    fullText += line;
                                    responseBox.innerHTML = fullText.replace(/\n/g, "<br>");
                                }
                            }
                        }
                    }
                }
                setTickerStatus("Idle");
            } catch (err) {
                responseBox.innerHTML = `<span class="text-red-400 font-semibold"><i class="fa-solid fa-triangle-exclamation"></i> Pipeline Error: ${err.message}</span>`;
                setTickerStatus("Error", true);
            }
        }

        window.onload = () => {
            syncSessionHistoryLog();
            if (navigator.onLine) runAuthenticationFlow();
        };
    </script>
</body>
</html>
